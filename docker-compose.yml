# Containerizes the FastAPI agent + bundled SPA. Ollama runs on the host
# (not in a sibling container), which keeps Metal GPU acceleration available
# on Apple Silicon and avoids shipping a multi-GB model image.
#
# Easy path:  ./scripts/start.sh   (detects Ollama, pulls models, builds, polls health)
# Stop:       ./scripts/stop.sh    (add --wipe to drop the persona volume too)
#
# Manual path (if you'd rather):
#   brew install ollama          # or your distro's package manager
#   ollama serve &               # or use the Ollama desktop app
#   ollama pull llama3:latest
#   ollama pull nomic-embed-text
#   docker compose up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: x-agent/app:local
    container_name: x-agent-app
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3:latest
      EMBEDDING_MODEL: nomic-embed-text
      PERSONA_DIR: /data/personas
      VOICE_MODEL_DIR: /data/models
      # Proxy /api/voice/* to the host-side sidecar (scripts/voice_server.py).
      # Matches the Ollama pattern: heavy ML models live on the host, the
      # container just makes loopback HTTP calls. This avoids running model
      # downloads from inside the container, which is important behind
      # corporate TLS interception (Zscaler, Cisco Secure Access, etc).
      # Override to "" to fall back to in-container engines.
      VOICE_REMOTE_URL: http://host.docker.internal:8765
    env_file:
      - path: .env
        required: false
    # `host-gateway` is the supported way to resolve host.docker.internal
    # on Linux too, even though Mac Docker Desktop sets it automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - persona_data:/data/personas
      # Caches the Kokoro-82M ONNX TTS weights + faster-whisper STT model.
      # Survives container restarts; first launch downloads ~350 MB total.
      # Read-only root FS means model files MUST live on a mounted volume.
      - model_cache:/data/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      # noexec is fine: voice now runs in the host-side sidecar (see
      # VOICE_REMOTE_URL). The container never extracts shared objects
      # at runtime.
      - /tmp:size=64m

volumes:
  persona_data:
  model_cache:
